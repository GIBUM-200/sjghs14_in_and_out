<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>외출·외박 확인증 제출</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      margin: 24px;
      max-width: 820px;
      background: #fafafa;
      color: #111;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 18px;
      background: #fff;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .row > div {
      flex: 1;
      min-width: 220px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: 650;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
      background: #fff;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }
    .btn {
      margin-top: 16px;
      padding: 12px 14px;
      border: 0;
      border-radius: 12px;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .hint {
      color: #555;
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.5;
    }
    .warn {
      color: #b00;
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.5;
    }
    .msg-box {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      font-size: 14px;
    }
    .msg-box.error {
      display: block;
      background: #fff5f5;
      border: 1px solid #f0c2c2;
      color: #8a1c1c;
    }
    .msg-title {
      font-weight: 700;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <h2>외출·외박 확인증 제출</h2>

  <div class="card">
    <form
      id="requestForm"
      method="POST"
      action="https://script.google.com/macros/s/AKfycbwaMPMGWiHi7pleGA-ibNQgp_ECx9-OINLRLRpKEgRgzJbPTYIu8nz6CLZlWackN0rV/exec"
      novalidate
    >
      <input type="hidden" id="submissionKey" name="submissionKey" />

      <div class="row">
        <div>
          <label for="studentId">학번</label>
          <input id="studentId" name="studentId" required placeholder="예: 1601" />
        </div>
        <div>
          <label for="studentName">이름</label>
          <input id="studentName" name="studentName" required placeholder="예: 김세국" />
        </div>
      </div>

      <label for="studentEmail">학교 도메인 메일</label>
      <input
        id="studentEmail"
        name="studentEmail"
        type="email"
        required
        pattern="26[0-9]{5}@sjgl\.sjeduhs\.kr"
        placeholder="예: 2610601@sjgl.sjeduhs.kr"
      />
      <div class="warn">※ 26숫자5자리@sjgl.sjeduhs.kr 형식만 입력 가능</div>

      <label for="type">유형</label>
      <select id="type" name="type" required>
        <option value="" selected disabled>선택</option>
        <option value="외출">외출</option>
        <option value="외박">외박</option>
      </select>

      <label for="reason">사유</label>
      <textarea id="reason" name="reason" rows="3" required placeholder="외출/외박 사유를 구체적으로 작성"></textarea>

      <div class="row">
        <div>
          <label for="departAt">출발 시간</label>
          <input id="departAt" name="departAt" type="datetime-local" required />
        </div>
        <div>
          <label for="returnAt">복귀 시간</label>
          <input id="returnAt" name="returnAt" type="datetime-local" required />
        </div>
      </div>

      <button id="submitBtn" class="btn" type="submit">제출</button>
      <div class="hint">
        [CHECK-0423] 테스트용 페이지입니다.<br>
        제출 후 결과 페이지로 이동합니다.<br>
        같은 신청을 반복 클릭하면 서버에서 한 번만 처리되도록 설정되어 있습니다.
      </div>

      <div id="messageBox" class="msg-box"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('requestForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('messageBox');
    const submissionKeyInput = document.getElementById('submissionKey');

    let isSubmitting = false;

    function issueSubmissionKey() {
      if (window.crypto && crypto.randomUUID) {
        submissionKeyInput.value = crypto.randomUUID();
      } else {
        submissionKeyInput.value =
          'sub_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      }
    }

    function showError(title, text) {
      messageBox.className = 'msg-box error';
      messageBox.innerHTML = `<div class="msg-title">${escapeHtml(title)}</div><div>${escapeHtml(text)}</div>`;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeText(value) {
      return String(value || '').trim();
    }

    function validateForm() {
      const studentId = normalizeText(form.studentId.value);
      const studentName = normalizeText(form.studentName.value);
      const studentEmail = normalizeText(form.studentEmail.value);
      const type = normalizeText(form.type.value);
      const reason = normalizeText(form.reason.value);
      const departAt = form.departAt.value;
      const returnAt = form.returnAt.value;

      if (!/^\d{4}$/.test(studentId)) {
        return '학번은 4자리 숫자로 입력하세요.';
      }
      if (!studentName) {
        return '이름을 입력하세요.';
      }

      const emailRe = /^26\d{5}@sjgl\.sjeduhs\.kr$/i;
      if (!emailRe.test(studentEmail)) {
        return '학교 도메인 이메일 형식만 입력 가능합니다. 예: 2612345@sjgl.sjeduhs.kr';
      }

      if (!type) {
        return '외출/외박 유형을 선택하세요.';
      }

      if (reason.length < 2) {
        return '사유를 2자 이상 입력하세요.';
      }

      if (!departAt) {
        return '출발 시간을 입력하세요.';
      }

      if (!returnAt) {
        return '복귀 시간을 입력하세요.';
      }

      const depart = new Date(departAt);
      const ret = new Date(returnAt);

      if (Number.isNaN(depart.getTime()) || Number.isNaN(ret.getTime())) {
        return '출발/복귀 시간 형식이 올바르지 않습니다.';
      }

      if (ret < depart) {
        return '복귀 시간이 출발 시간보다 빠를 수 없습니다.';
      }

      return '';
    }

    form.addEventListener('submit', (ev) => {
      if (isSubmitting) {
        ev.preventDefault();
        return;
      }

      const validationError = validateForm();
      if (validationError) {
        ev.preventDefault();
        showError('[CHECK-0423] 입력 확인', validationError);
        return;
      }

      isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.textContent = '[CHECK-0423] 제출 중...';
    });

    issueSubmissionKey();
  </script>
</body>
</html>
