<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>외출·외박 확인증 제출</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; max-width: 820px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 18px; }
    .row { display:flex; gap:12px; flex-wrap: wrap; }
    .row > div { flex:1; min-width: 220px; }
    label { display:block; margin-top: 12px; font-weight: 650; }
    input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
    .btn { margin-top: 16px; padding: 12px 14px; border: 0; border-radius: 12px; background:#111; color:#fff; cursor:pointer; font-size: 16px; }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .hint { color:#555; font-size: 13px; margin-top: 8px; }
    .warn { color:#b00; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>외출·외박 확인증 제출</h2>

  <div class="card">
    <form id="requestForm" method="POST" action="https://script.google.com/macros/s/AKfycbw7fLuiqBa2lNtfdyl-hFsuQjYZn6fdhp4uuoLNwYcD54niS1RqZq71WNGrH6gI8QnW/exec">
      <div class="row">
        <div>
          <label>학번</label>
          <input name="studentId" required placeholder="예: 1101" />
        </div>
        <div>
          <label>이름</label>
          <input name="studentName" required placeholder="예: 홍길동" />
        </div>
      </div>

      <label>학교 도메인 메일</label>
      <input
        name="studentEmail"
        type="email"
        required
        pattern="26[0-9]{5}@sjgl\.sjeduhs\.kr"
        placeholder="예: 2610121@sjgl.sjeduhs.kr"
      />
      <div class="warn">※ 26숫자5자리@sjgl.sjeduhs.kr 형식만 입력 가능</div>

      <label>유형</label>
      <select name="type" required>
        <option value="" selected disabled>선택</option>
        <option value="외출">외출</option>
        <option value="외박">외박</option>
      </select>

      <label>사유</label>
      <textarea name="reason" rows="3" required placeholder="외출/외박 사유를 구체적으로 작성"></textarea>

      <div class="row">
        <div>
          <label>출발 시간</label>
          <input name="departAt" type="datetime-local" required />
        </div>
        <div>
          <label>복귀 시간</label>
          <input name="returnAt" type="datetime-local" required />
        </div>
      </div>

      <button id="submitBtn" class="btn" type="submit">제출</button>
      <div class="hint">제출 후 완료 안내문이 바로 표시됩니다.</div>
    </form>
  </div>

  <script>
    const form = document.getElementById('requestForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', (ev) => {
      const fd = new FormData(form);

      const email = String(fd.get('studentEmail') || '').trim();
      const emailRe = /^26\d{5}@sjgl\.sjeduhs\.kr$/i;
      if (!emailRe.test(email)) {
        ev.preventDefault();
        alert('학교 도메인 이메일 형식만 입력 가능합니다. 예: 2612345@sjgl.sjeduhs.kr');
        return;
      }

      const depart = new Date(fd.get('departAt'));
      const ret = new Date(fd.get('returnAt'));

      if (ret < depart) {
        ev.preventDefault();
        alert('복귀 시간이 출발 시간보다 빠를 수 없습니다.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '제출 중...';
    });
  </script>
</body>
</html>
